spring:
  datasource:
    url: jdbc:h2:mem:attendance;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
  sql:
    init:
      mode: always
      data-locations: classpath:data-local.sql
  h2:
    console:
      enabled: true
      path: /h2-console
